[package]
name = "graph"
version = "0.1.0"
edition = "2024"
description = "Core of the database"
license = "MIT"
repository = "https://github.com/FalkorDB/falkordb-rs-next-gen"
readme = "../README.md"
keywords = ["graph", "database"]
categories = ["data-structures", "database"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(tarpaulin)'] }


# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
csv = "1.3.1"
itertools = "0.14.0"
lru = "0.16.0"
once_cell = "1.21.3"
ordermap = "0.5.8"
orx-tree = "1.7.1"
rand = "0.9.1"
regex = "1.11.1"
reqwest = { version = "0.12.22", features = ["blocking", "rustls-tls"] }
roaring = "0.11.0"
tracing = "0.1"
unescaper = "0.1.6"
