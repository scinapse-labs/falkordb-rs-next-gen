[package]
name = "graph"
version = "0.1.0"
edition = "2024"
description = "Core of the database"
license = "MIT"
repository = "https://github.com/FalkorDB/falkordb-rs-next-gen"
readme = "../README.md"
keywords = ["graph", "database"]
categories = ["data-structures", "database"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(tarpaulin)'] }


# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
atomic_refcell = "0.1.13"
csv = "1.3.1"
itertools = "0.14.0"
lru = "0.16.0"
num_cpus = "1.17.0"
once_cell = "1.21.3"
ordermap = "0.5.9"
orx-tree = "1.8.0"
rand = "0.9.2"
regex = "1.11.2"
reqwest = { version = "0.12.23", default-features = false, features = ["blocking", "rustls-tls"] }
roaring = "0.11.2"
unescaper = "0.1.6"
