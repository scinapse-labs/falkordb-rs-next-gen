name: Rust PR

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_FUZZ_VERSION: 0.13.1

permissions:
  contents: read

jobs:
  check-files:
    runs-on: ubuntu-latest
    outputs:
      file_changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Check if specific file changed
        id: check
        run: |
          if git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | grep -q "build/Dockerfile"; then
            echo "changed=true"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
  docker:
    needs: check-files
    if: needs.check-files.outputs.file_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          push: true
          tags: aviavni/falkordb-build:${{ github.event.pull_request.number }}
          context: ./build
  lint:
    runs-on: ubuntu-latest
    container: aviavni/falkordb-build:${{ needs.check-files.outputs.file_changed == 'true' && github.event.pull_request.number || 'latest' }}
    needs:
      - check-files
      - docker
    if: ${{ !cancelled() && (needs.docker.result == 'success' || needs.docker.result == 'skipped') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "clippy"
      - name: Format
        run: cargo fmt --all --check
      - name: Lint
        run: |
          CXX=clang++-22 cargo clippy --all-targets
  test:
    runs-on: ubuntu-latest
    container: aviavni/falkordb-build:${{ needs.check-files.outputs.file_changed == 'true' && github.event.pull_request.number || 'latest' }}
    needs:
      - check-files
      - docker
    if: ${{ !cancelled() && (needs.docker.result == 'success' || needs.docker.result == 'skipped') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "release"
      - name: Build
        run: |
          cargo build --release
      - name: Run unit tests
        run: |
          cargo test --release -p graph
      - name: Run tests
        run: |
          . /data/venv/bin/activate
          RELEASE=1 pytest tests/test_e2e.py tests/test_functions.py tests/test_mvcc.py tests/test_concurrency.py -vv
      - name: Run Flow tests
        run: |
          . /data/venv/bin/activate
          RELEASE=1 ./flow.sh
      - name: Run TCK tests
        run: |
          . /data/venv/bin/activate
          RELEASE=1 TCK_DONE=tck_done.txt pytest tests/tck/test_tck.py -s
  coverage:
    runs-on: ubuntu-latest
    container: aviavni/falkordb-build:${{ needs.check-files.outputs.file_changed == 'true' && github.event.pull_request.number || 'latest' }}
    needs:
      - check-files
      - docker
    if: ${{ !cancelled() && (needs.docker.result == 'success' || needs.docker.result == 'skipped') }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "coverage"
          env-vars: "RUSTFLAGS"
      - name: Run code coverage
        run: |
          RUSTFLAGS="-C instrument-coverage" cargo build
          RUSTFLAGS="-C instrument-coverage" cargo test -p graph
          . /data/venv/bin/activate
          pytest tests/test_e2e.py tests/test_functions.py tests/test_mvcc.py tests/test_concurrency.py -vv
          ./flow.sh
          TCK_DONE=tck_done.txt pytest tests/tck/test_tck.py -s
          llvm-profdata-22 merge --sparse `find . -name "*.profraw"` -o cov.profdata
          llvm-cov-22 export --format=lcov --instr-profile cov.profdata target/debug/libfalkordb.so > codecov.txt.all
          lcov --ignore-errors unused -r codecov.txt.all -o codecov.txt
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
  fuzz:
    runs-on: ubuntu-latest
    container: aviavni/falkordb-build:${{ needs.check-files.outputs.file_changed == 'true' && github.event.pull_request.number || 'latest' }}
    needs:
      - check-files
      - docker
    if: ${{ !cancelled() && (needs.docker.result == 'success' || needs.docker.result == 'skipped') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: rustup default nightly
      - run: rustup component add llvm-tools-preview
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ runner.tool_cache }}/cargo-fuzz
          key: cargo-fuzz-bin-${{ env.CARGO_FUZZ_VERSION }}
      - run: echo "${{ runner.tool_cache }}/cargo-fuzz/bin" >> $GITHUB_PATH
      - run: cargo install --root "${{ runner.tool_cache }}/cargo-fuzz" --version ${{ env.CARGO_FUZZ_VERSION }} cargo-fuzz --locked
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: fuzzing-corpus
          path: fuzz/corpus
        continue-on-error: true
      - name: Run fuzz tests
        run: |
          cargo build --features fuzz
          . /data/venv/bin/activate
          mkdir -p fuzz/corpus/fuzz_target_runtime/
          TCK_DONE=tck_done.txt pytest tests/tck/test_tck.py -s
          CXX=clang++-22 CARGO_PROFILE_RELEASE_LTO=false cargo fuzz build fuzz_target_runtime
          CXX=clang++-22 CARGO_PROFILE_RELEASE_LTO=false cargo fuzz run fuzz_target_runtime -- -max_total_time=300
          CXX=clang++-22 CARGO_PROFILE_RELEASE_LTO=false cargo fuzz cmin fuzz_target_runtime
          CXX=clang++-22 CARGO_PROFILE_RELEASE_LTO=false cargo fuzz coverage fuzz_target_runtime
          TOOLCHAIN_LLVM_COV=$(find $(rustc --print sysroot) -name "llvm-cov" -type f | head -1)
          echo "Using llvm-cov from: $TOOLCHAIN_LLVM_COV"
          "$TOOLCHAIN_LLVM_COV" --version
          "$TOOLCHAIN_LLVM_COV" export --format=lcov --instr-profile fuzz/coverage/fuzz_target_runtime/coverage.profdata target/x86_64-unknown-linux-gnu/coverage/x86_64-unknown-linux-gnu/release/fuzz_target_runtime > codecov.txt.all
          lcov --ignore-errors unused -r codecov.txt.all -o codecov.txt

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: fuzz
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ !cancelled() }}
        with:
          name: fuzzing-corpus
          path: fuzz/corpus
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: fuzzing-artifacts-fuzz_target_runtime-${{ github.sha }}
          path: fuzz/artifacts
      - name: Display fuzz artifacts if they exist
        if: failure()  
        run: |        
          if [ -d "fuzz/artifacts" ] && [ "$(ls -A fuzz/artifacts)" ]; then
            echo "Found fuzz artifacts, displaying content:"
            find fuzz/artifacts -type f -not -path "*/\.*" | while read file; do
              echo "=== Content of $file ==="
              cat "$file" || echo "Failed to cat file (might be binary content)"
              echo ""
              echo "========================="
            done
          else                                                              
            echo "No fuzz artifacts found or directory is empty"           
          fi                                                                
  benchmark:
    runs-on: ubuntu-latest
    container: aviavni/falkordb-build:${{ needs.check-files.outputs.file_changed == 'true' && github.event.pull_request.number || 'latest' }}
    needs:
      - check-files
      - docker
    if: ${{ !cancelled() && (needs.docker.result == 'success' || needs.docker.result == 'skipped') }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "release"
      - name: Build and run benchmark
        run: |
          cargo build --release
          . /data/venv/bin/activate
          pytest tests/test_bench.py --benchmark-json output.json -vv
      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@a60cea5bc7b49e15c1f58f411161f99e0df48372
        with:
          name: FalkorDB Benchmark
          tool: 'pytest'
          output-file-path: output.json
          # GitHub API token to make a commit comment
          github-token: ${{ secrets.GITHUB_TOKEN }}
          summary-always: true
          # Don't push to gh-pages branch in the PR
          auto-push: false
  falkordb-e2e-compatibility:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      falkordb:
        image: falkordb/falkordb:latest
        ports:
          - 6379:6379
        volumes:
          - ./data:/var/lib/falkordb/data
        options: >-
          --rm
          -it
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: tests/requirements.txt
      - name: Wait for FalkorDB to be ready
        run: |
          # Wait until port 6379 is open (max 30 seconds)
          for i in {1..30}; do
            if nc -z localhost 6379; then
              echo "FalkorDB is up!"
              break
            fi
            echo "Waiting for FalkorDB..."
            sleep 1
          done
      - name: Run FalkorDB e2e tests
        run: |
          pip install -r tests/requirements.txt
          pytest -v -m "not extra" tests/test_e2e.py tests/test_functions.py -vv
